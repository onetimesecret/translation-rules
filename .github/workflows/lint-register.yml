name: lint-register

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate register.yaml files parse
        run: |
          shopt -s nullglob
          fail=0
          for f in locales/*/register.yaml; do
            if ! yq '.' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::register.yaml is not valid YAML"
              fail=1
            fi
          done
          exit $fail

      - name: Self-test linter against fixtures
        run: |
          # Phase 0 linter has no real content to scan in this repo;
          # we exercise --dry-run for every authored locale to confirm the
          # token list parses end-to-end. Real content scanning happens in
          # the app repo's CI gate (P1-4b).
          shopt -s nullglob
          for d in locales/*/; do
            locale="$(basename "$d")"
            if [ -f "${d}register.yaml" ]; then
              echo "::group::dry-run ${locale}"
              bin/lint-register "$locale" "non-existent-glob/*" --dry-run
              echo "::endgroup::"
            fi
          done
