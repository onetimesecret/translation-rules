name: schema-validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the retro lifecycle gate diffs against the PR base
          # ref to enforce the applied-transition check (SPEC §3).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python (ruff)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.15"
          ruff check .

      - name: Install pinned validator deps
        run: |
          python -m pip install \
            "jsonschema>=4.21,<5" \
            "referencing>=0.32,<1" \
            "pyyaml>=6,<7"

      - name: Run schema fixture suite
        run: python tests/schema/run.py

      - name: Run resolver inheritance fixture suite
        run: python tests/inheritance/run.py

      - name: Run resolver emit + lint fixture suite
        run: python tests/resolver/run.py

      - name: Run retro lifecycle test suite
        run: python tests/retro_lifecycle/run.py

      - name: Run archive firewall test suite
        run: python tests/archive_firewall/run.py

      - name: Run review manifest test suite
        run: python tests/review_manifest/run.py

      - name: Retrospective lifecycle gate (SPEC §3)
        # The one graced id is a structural retro whose closure is blocked on
        # cross-repo work (P1-4b/P1-5b) — see its body and RECOVERY-PLAN.md.
        # The waiver is per-id: any new retro left pending >7 days fails CI.
        run: |
          ARGS=(--grace 2026-04-26-start-translation-session-conventions-drift)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ARGS+=(--diff-base "origin/${{ github.base_ref }}")
          fi
          python lib/resolver/retro_lifecycle.py "${ARGS[@]}"

      - name: Review findings-manifest gate (SPEC §3)
        run: python lib/resolver/review_manifest.py

      # SPEC §2.4 "lint across every resolved locale" — fixtures alone never
      # touch the real tree, so run the step-6 lint against it here.
      - name: Resolver lint against repo tree (forbidden tokens in examples + embedded docs)
        run: python lib/resolver/resolve.py --all --lint --validate-only
