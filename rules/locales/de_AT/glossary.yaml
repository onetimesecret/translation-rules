id: glossary.de_AT
source: reviews/2026-04-12/
# Sense split at the heart of the 2026-04-12 incident: the secret *object*
# (Geheimnis) was zeroed out and collapsed into the payload term (Nachricht).
# These two senses keep them distinct. Targets and examples are AGENT-AUTHORED
# and require native-speaker (AT) sign-off before merge — see PR label.
terms:
  - id: term.secret_object#c0902808
    key: secret_object
    en: secret
    disambiguation:
      heuristic: "The protected entity itself — created, shared, burned, or expired. Lifecycle verbs signal the object sense."
      key_patterns: ["*secret*", "*.burn*", "*.share*", "*.expire*"]
    de_AT:
      noun:
        target: Geheimnis
        rule_ref: rule.terminology-consistency
    rule_refs: [register.de_AT.formality, rule.terminology-consistency]
    examples:
      - id: ex.secret-created#e4355c4f
        source: "Your secret has been created."
        target: "Ihr Geheimnis wurde erstellt."
        verdict: good
        rule_refs: [register.de_AT.formality]
      - id: ex.secret-genitive#cb21d6c1
        source: "The secret's link has expired."
        target: "Der Link des Geheimnisses ist abgelaufen."
        verdict: good
        note: "Genitive inflection; word_prefix match keeps the Geheimnis sense."
      - id: ex.secret-informal#40c23f2d
        source: "Your secret has been created."
        target: "Dein Geheimnis wurde erstellt."
        verdict: bad
        note: "Informal possessive 'Dein' — the forbidden register. Reproduces the 2026-04-12 flip."
  - id: term.secret_payload#1687a617
    key: secret_payload
    en: secret message
    disambiguation:
      heuristic: "The user-entered message content being protected, distinct from the secret object. Input/compose contexts signal the payload sense."
      key_patterns: ["*.message*", "*.content*", "*.body*"]
    de_AT:
      noun:
        target: Nachricht
        rule_ref: rule.terminology-consistency
    rule_refs: [register.de_AT.formality, rule.terminology-consistency]
    examples:
      - id: ex.message-enter#9a4a3f91
        source: "Enter your secret message"
        target: "Geben Sie Ihre Nachricht ein"
        verdict: good
        rule_refs: [register.de_AT.formality]
      - id: ex.message-informal#78142c00
        source: "Enter your secret message"
        target: "Gib deine Nachricht ein"
        verdict: bad
        note: "Informal imperative 'Gib' plus 'deine' — forbidden register."
